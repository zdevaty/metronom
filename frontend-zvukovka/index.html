<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zvukovka</title>
    <script src="p5.min.js"></script>
    <script src="/shared/config.js"></script>
    <script src="/shared/preset-loader.js"></script>
    <script src="pendulum.js" defer></script>
    <link rel="stylesheet" href="/shared/styles.css">
</head>
<body>
  <div style="display: flex; width: 100%; height: 100vh;">
    <!-- Left preset container -->
    <div id="presetContainerLeft" class="preset-container"></div>

    <!-- Metronome (center) -->
    <div id="metronomeContainer">
      <div id="presetDisplay">
        <span class="preset-name">Zvukovka</span>
        <span class="preset-details"></span>
      </div>
      <div id="metronomeCanvas"></div>
    </div>

    <!-- Right preset container -->
    <div id="presetContainerRight" class="preset-container"></div>
  </div>
</body>

</html>
